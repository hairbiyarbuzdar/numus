# Nginx reverse proxy for Numu.
#
# Routes:
#   /api/       -> Express backend  (port 4000)
#   /socket.io/ -> Socket.io        (port 4000, WebSocket upgrade)
#   /health     -> backend health check
#   /           -> Next.js frontend (port 3000)
#
# INSTALL:
#   1. Replace YOUR_DOMAIN below with your real domain (e.g. numu.com.pk www.numu.com.pk)
#   2. sudo cp deploy/nginx-numu.conf /etc/nginx/sites-available/numu
#   3. sudo ln -sf /etc/nginx/sites-available/numu /etc/nginx/sites-enabled/numu
#   4. sudo rm -f /etc/nginx/sites-enabled/default
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN   # adds HTTPS (rewrites this file)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow large-ish uploads (backend accepts 10mb JSON bodies)
    client_max_body_size 12M;

    # ─── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Socket.io (WebSocket) ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
    }

    # ─── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # ─── Next.js frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
